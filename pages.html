<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .container {
            width: 100%;
            height: 100vh;
            max-width: 100%;
            max-height: 100vh;
            background: white;
            position: relative;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        #conteudo {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .elemento {
            opacity: 0;
            transform: translateY(30px);
            animation: aparecer 0.6s forwards;
        }
        @keyframes aparecer {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .elemento.saindo {
            animation: sumir 0.4s forwards;
        }
        @keyframes sumir {
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }
        
        /* ===== AJUSTE PARA TELINHA DO MONITOR ===== */
        .modelo-wrapper {
            width: 100%;
            height: 100vh;
            padding: 10px 20px !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
            transform: scale(0.65);
            transform-origin: center center;
        }
        
        /* Ajustes específicos para telas pequenas */
        .header-modelo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 !important;
            flex-wrap: wrap;
            gap: 4px;
            flex-shrink: 0;
        }
        .header-modelo .logo {
            font-size: 0.9rem !important;
        }
        .nav-modelo a {
            text-decoration: none;
            font-weight: 500;
            margin-left: 8px !important;
            font-size: 0.55rem !important;
            transition: color 0.3s;
        }
        .hero-modelo {
            padding: 4px 0 4px !important;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .hero-modelo h1 {
            font-size: 1.2rem !important;
            font-weight: 800;
            line-height: 1.2;
        }
        .hero-modelo p {
            font-size: 0.6rem !important;
            max-width: 300px;
            margin: 4px auto 8px !important;
            line-height: 1.3;
        }
        .btn-modelo {
            border: none;
            padding: 5px 16px !important;
            border-radius: 50px;
            font-size: 0.6rem !important;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            margin: 0 auto;
        }
        .btn-modelo:hover {
            transform: translateY(-2px);
        }
        .footer-modelo {
            margin-top: 6px !important;
            padding-top: 6px !important;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            flex-shrink: 0;
        }
        .footer-modelo p {
            font-size: 0.5rem !important;
            color: #777;
        }
        .footer-modelo a {
            color: #777;
            text-decoration: none;
            margin-left: 8px !important;
            font-size: 0.5rem !important;
        }
        .footer-modelo a:hover {
            color: #1a5f9e;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px !important;
            margin-top: 6px !important;
            flex-shrink: 0;
        }
        .card-item {
            padding: 8px !important;
            border-radius: 10px !important;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
        }
        .card-item .icone {
            font-size: 1.2rem !important;
            display: block;
            margin-bottom: 2px;
        }
        .card-item h3 {
            font-size: 0.6rem !important;
        }
        .card-item p {
            font-size: 0.5rem !important;
        }
        
        /* E-commerce */
        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 6px !important;
            margin-top: 6px !important;
            flex-shrink: 0;
        }
        .produto-item {
            background: white;
            padding: 6px !important;
            border-radius: 8px !important;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid #f0f0f0;
        }
        .produto-item .nome {
            font-size: 0.55rem !important;
        }
        .produto-item .preco {
            font-size: 0.7rem !important;
            font-weight: 700;
            color: #e11d48;
            margin: 1px 0 !important;
        }
        .produto-item > div:first-child {
            font-size: 20px !important;
        }
        .produto-item > div:last-child {
            font-size: 0.5rem !important;
        }
        
        /* Blog */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 6px !important;
            margin-top: 6px !important;
            flex-shrink: 0;
        }
        .post-item {
            background: white;
            padding: 8px !important;
            border-radius: 8px !important;
            border: 1px solid #f0ede8;
        }
        .post-item .categoria {
            font-size: 0.4rem !important;
            text-transform: uppercase;
            color: #d97706;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .post-item h3 {
            margin: 2px 0 !important;
            font-size: 0.6rem !important;
            color: #1a2a3a;
        }
        .post-item .resumo {
            font-size: 0.5rem !important;
            color: #5a6a7a;
        }
        
        /* Stats para landing */
        .stats {
            display: flex;
            justify-content: center;
            gap: 15px !important;
            margin-top: 8px !important;
            flex-wrap: wrap;
        }
        .stats .num {
            font-size: 1rem !important;
            font-weight: 700;
            color: #60a5fa;
        }
        .stats .label {
            font-size: 0.5rem !important;
            color: rgba(255, 255, 255, 0.5);

        .modelo-financeiro .card-item {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
        }
        
        /* Ajuste para modelos com gradiente */
        .modelo-criativo {
            background: linear-gradient(135deg, #fdf6f0, #f0e6ff);
        }
        .modelo-saude {

        let indiceAtual = 0;
        let intervalo;

        function montarModelo(indice) {
            const conteudo = document.getElementById('conteudo');
            const elementos = conteudo.querySelectorAll('.elemento');
            elementos.forEach(el => el.classList.add('saindo'));

            setTimeout(() => {
                conteudo.innerHTML = modelos[indice].html;
                const filhos = conteudo.children;
                for (let i = 0; i < filhos.length; i++) {
                    const filho = filhos[i];
                    filho.classList.add('elemento');
                    filho.style.animationDelay = (i * 0.15 + 0.1) + 's';
                }
                const itens = conteudo.querySelectorAll('.card-item, .produto-item, .post-item');
                itens.forEach((item, index) => {
                    item.classList.add('elemento');
                    item.style.animationDelay = (index * 0.1 + 0.5) + 's';
                });
            }, 400);
        }

        function proximoModelo() {
            indiceAtual = (indiceAtual + 1) % modelos.length;
            montarModelo(indiceAtual);
        }

        function iniciar() {
            montarModelo(0);
            intervalo = setInterval(proximoModelo, 5000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciar);
        } else {
            iniciar();
        }
    </script>
